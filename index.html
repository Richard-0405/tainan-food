<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台南美食清單</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCAMVdyrK3bE8i0mnBHkYOlF4d4Vvli_zY&libraries=places&language=zh-TW"></script>

    <style>
        :root { --primary: #ff6b6b; --secondary: #0984e3; --bg: #f8f9fa; --accent: #6c5ce7; --success: #00b894; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; }

        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: #333; font-size: 1.4rem; }
        .btn-random { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        input, select, button { padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 0.95rem; outline: none; }
        input[type="text"] { flex: 2; min-width: 150px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* 推薦結果樣式 */
        #recommendResult { margin-top: 15px; display: grid; gap: 10px; }
        .rec-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f0f7ff; border-radius: 8px; border: 1px solid #d0e4ff; }
        .rec-item strong { color: #0747a6; font-size: 0.95rem; }
        .rec-btn-add { background: var(--success); font-size: 0.8rem; padding: 5px 10px; }

        .category-section { margin-bottom: 15px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .category-title { background: #4834d4; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .shop-item { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; display: flex; align-items: center; background: white; }
        .info { flex-grow: 1; overflow: hidden; margin-left: 10px; }
        .info strong { font-size: 1rem; color: #2d3436; display: block; }
        .info small { color: #636e72; font-size: 0.85rem; display: block; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .actions { display: flex; gap: 6px; }
        .actions button, .actions a { background: #f8f9fa; border: 1px solid #eee; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .random-card { background: white; padding: 30px; border-radius: 24px; text-align: center; width: 85%; max-width: 350px; }
        .slot-machine { font-size: 1.8rem; font-weight: bold; margin: 25px 0; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🍴 台南美食清單</h1>
        <button class="btn-random" onclick="pickRandomShop()">🎲 幫我選一個！</button>
    </div>

    <div class="card">
        <h3 style="margin-top: 0; font-size: 1rem; color: var(--secondary);">📍 看看這附近有什麼？</h3>
        <div class="input-group">
            <input type="text" id="userLocation" placeholder="輸入目前地址（例如：台南車站）">
            <button onclick="recommendShops()" style="background: var(--secondary);">🔍 推薦 5 家</button>
        </div>
        <div id="recommendResult"></div>
    </div>

    <div class="card input-group">
        <input type="text" id="newCategoryName" placeholder="📁 新增類別 (如：甜點)">
        <button onclick="addNewCategory()" style="background: var(--secondary);">+ 建立類別</button>
    </div>

    <div class="card input-group">
        <input type="text" id="shopName" placeholder="🏪 輸入店名">
        <input type="text" id="shopAddr" placeholder="📍 地址/網址">
        <select id="categorySelect"></select>
        <button onclick="addShop()">新增店家</button>
    </div>

    <div id="listsContainer"></div>
</div>

<div id="randomOverlay" class="overlay">
    <div class="random-card">
        <div class="slot-machine" id="slotLabel">準備中...</div>
        <div id="finalCat"></div>
        <div id="resultActions" style="display:none;">
            <a id="randomMapBtn" href="#" target="_blank" style="background:var(--success); color:white; padding:12px; display:block; text-decoration:none; border-radius:10px; margin:10px 0;">導航</a>
            <button onclick="closeOverlay()" style="width:100%; padding:10px; border:none; border-radius:10px;">關閉</button>
        </div>
    </div>
</div>

<script>
    // Firebase 初始化 (請保留您的設定)
    const firebaseConfig = { apiKey: "AIzaSyB90vqYZY_2QM0IBZcJjGcvtmshLsJ89U0", authDomain: "food-store-8be2a.firebaseapp.com", projectId: "food-store-8be2a", databaseURL: "https://food-store-8be2a-default-rtdb.firebaseio.com", storageBucket: "food-store-8be2a.firebasestorage.app", messagingSenderId: "307868347359", appId: "1:307868347359:web:78cb5bbaa6d82970c0726a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 🌟 推薦店家功能
    function recommendShops() {
        const locationInput = document.getElementById('userLocation').value;
        if (!locationInput) return alert("請先輸入地址喔！");

        const geocoder = new google.maps.Geocoder();
        const resDiv = document.getElementById('recommendResult');
        resDiv.innerHTML = "🔍 正在搜尋周邊美食...";

        geocoder.geocode({ address: locationInput }, (results, status) => {
            if (status === "OK") {
                const location = results[0].geometry.location;
                const service = new google.maps.places.PlacesService(document.createElement('div'));
                
                service.nearbySearch({
                    location: location,
                    radius: 1000, // 搜尋方圓 1 公里
                    type: ['restaurant'],
                    language: 'zh-TW'
                }, (places, status) => {
                    if (status === google.maps.places.PlacesServiceStatus.OK) {
                        resDiv.innerHTML = "";
                        // 只取前 5 家店
                        places.slice(0, 5).forEach(place => {
                            const item = document.createElement('div');
                            item.className = 'rec-item';
                            item.innerHTML = `
                                <div>
                                    <strong>${place.name}</strong><br>
                                    <span style="font-size:0.8rem; color:#888;">⭐ ${place.rating || '無評分'}</span>
                                </div>
                                <button class="rec-btn-add" onclick="quickAdd('${place.name.replace(/'/g, "\\'")}', '${place.place_id}')">加入清單</button>
                            `;
                            resDiv.appendChild(item);
                        });
                    }
                });
            } else {
                resDiv.innerHTML = "❌ 找不到這個地址，請再試試看。";
            }
        });
    }

    // 快速加入功能（自動抓取店鋪詳細網址）
    function quickAdd(name, placeId) {
        const catId = document.getElementById('categorySelect').value;
        if (!catId) return alert("請先建立並選擇一個類別！");
        
        const service = new google.maps.places.PlacesService(document.createElement('div'));
        service.getDetails({ placeId: placeId, fields: ['url'] }, (place) => {
            createShopItem(catId, name, place.url || "");
            saveData();
            alert(`已將「${name}」加入清單！`);
        });
    }

    // --- 以下為原本的邏輯 (簡化顯示) ---
    function initAutocomplete() {
        new google.maps.places.Autocomplete(document.getElementById('shopName'));
        new google.maps.places.Autocomplete(document.getElementById('userLocation'));
    }
    window.onload = initAutocomplete;

    db.ref('sharedFoodList').on('value', snapshot => { renderAllData(snapshot.val() || []); });

    function renderAllData(data) {
        document.getElementById('listsContainer').innerHTML = '';
        document.getElementById('categorySelect').innerHTML = '';
        data.forEach(cat => {
            createCategorySection(cat.name, cat.id, cat.collapsed);
            if (cat.shops) cat.shops.forEach(s => createShopItem(cat.id, s.name, s.addr, s.review));
        });
    }

    function createCategorySection(name, id, collapsed) {
        const option = document.createElement('option');
        option.value = id; option.innerText = name;
        document.getElementById('categorySelect').appendChild(option);

        const section = document.createElement('div');
        section.className = 'category-section';
        section.id = 'section-' + id;
        section.innerHTML = `
            <div class="category-title">
                <strong onclick="toggleCategory('${id}')">${name}</strong>
                <button onclick="deleteCategory('${id}')" style="background:none;">❌</button>
            </div>
            <ul class="shop-list ${collapsed ? 'collapsed' : ''}" id="${id}"></ul>
        `;
        document.getElementById('listsContainer').appendChild(section);
    }

    function createShopItem(catId, name, addr) {
        const li = document.createElement('li');
        li.className = 'shop-item';
        li.setAttribute('data-addr', addr);
        li.innerHTML = `
            <div class="info"><strong>${name}</strong><small>${addr.includes('http') ? '📍 地圖連結' : addr}</small></div>
            <div class="actions">
                <a href="${addr}" target="_blank">🔍</a>
                <button onclick="this.closest('.shop-item').remove(); saveData();">❌</button>
            </div>
        `;
        document.getElementById(catId).appendChild(li);
    }

    function saveData() {
        const data = [];
        document.querySelectorAll('.category-section').forEach(sec => {
            const id = sec.id.replace('section-', '');
            const shops = [];
            sec.querySelectorAll('.shop-item').forEach(li => {
                shops.push({ name: li.querySelector('strong').innerText, addr: li.getAttribute('data-addr') });
            });
            data.push({ id, name: sec.querySelector('strong').innerText, shops });
        });
        db.ref('sharedFoodList').set(data);
    }

    function addNewCategory() {
        const n = document.getElementById('newCategoryName').value;
        if(n) { createCategorySection(n, 'cat-'+Date.now()); saveData(); }
    }

    function addShop() {
        const n = document.getElementById('shopName').value;
        const a = document.getElementById('shopAddr').value;
        const c = document.getElementById('categorySelect').value;
        if(n && c) { createShopItem(c, n, a); saveData(); }
    }
</script>
</body>
</html>
